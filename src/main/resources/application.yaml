spring:
  application:
    name: locadora-rdt-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:test}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

management:
  health:
    mail:
      enabled: ${MAIL_HEALTH_ENABLED:false}

security:
  oauth2:
    client:
      client-id: ${OAUTH_CLIENT_ID}
      client-secret: ${OAUTH_CLIENT_SECRET}

jwt:
  secret: ${JWT_SECRET}
  duration: 86400

app:
  frontend:
    base-url: http://localhost:4200
  activation:
    token-minutes: 30
  geoapify:
    base-url: ${GEOAPIFY_BASE_URL:https://api.geoapify.com}
    api-key: ${GEOAPIFY_API_KEY:}
