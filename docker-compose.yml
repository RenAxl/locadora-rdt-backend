services:
  postgres:
    image: postgres:16
    container_name: locadora-rdt-postgres
    environment:
      POSTGRES_DB: locadora_rdt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - locadora_rdt_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d locadora_rdt"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - locadora_rdt_network

  backend:
    build:
      context: .
    image: locadora-rdt-backend:${IMAGE_TAG:-0.0.1}
    container_name: locadora-rdt-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/locadora_rdt
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      JWT_SECRET: local-jwt-secret
      MANAGEMENT_HEALTH_MAIL_ENABLED: "false"
      APP_MAIL_ENABLED: ${APP_MAIL_ENABLED:-true}
      EMAIL_USERNAME: ${EMAIL_USERNAME:?EMAIL_USERNAME is required}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:?EMAIL_PASSWORD is required}
      OAUTH_CLIENT_ID: locadorardt
      OAUTH_CLIENT_SECRET: locadorardt123
      APP_FRONTEND_BASE_URL: http://localhost:4200
      GEOAPIFY_BASE_URL: ${GEOAPIFY_BASE_URL:-https://api.geoapify.com}
      GEOAPIFY_API_KEY: ${GEOAPIFY_API_KEY}
      APP_WHATSAPP_ENABLED: ${APP_WHATSAPP_ENABLED:-false}
      EVOLUTION_API_BASE_URL: ${EVOLUTION_API_BASE_URL:-http://host.docker.internal:8081}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-}
      EVOLUTION_INSTANCE_NAME: ${EVOLUTION_INSTANCE_NAME:-locadora-rdt}
    ports:
      - "8080:8080"
    networks:
      - locadora_rdt_network

volumes:
  locadora_rdt_postgres_data:

networks:
  locadora_rdt_network:
